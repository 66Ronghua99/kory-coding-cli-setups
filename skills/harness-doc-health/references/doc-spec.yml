# harness-doc-health 内置文档规范
# 定义所有文档类型的结构要求和检查规则

document_types:
  # ============================================================================
  # Plan: 执行计划文档
  # 路径: docs/plans/**/*.md
  # 用途: 定义功能范围、目标、任务清单
  # ============================================================================
  plan:
    type_tag: '<!-- type: plan -->'
    path_pattern: 'docs/plans/**/*.md'
    required_frontmatter:
      - pattern: '^> .*状态.*'
        description: '必须包含状态标记'
    required_sections:
      - name: '背景'
        pattern: '^## 背景'
      - name: '目标'
        pattern: '^## 目标'
      - name: '技术方案'
        pattern: '^## 技术方案'
      - name: '任务清单'
        pattern: '^## 任务清单'
    structural_sections:
      - name: 'entities'
        marker: '<!-- section:entities -->'
        element_marker: '<!-- entity -->'
        element_pattern: '^### (.+?) <!-- entity -->$'
        required: false
      - name: 'flows'
        marker: '<!-- section:flows -->'
        element_marker: '<!-- flow -->'
        element_pattern: '^### (.+?) <!-- flow -->$'
        required: false
    cross_ref_checks:
      - type: 'entity_existence'
        description: '引用的 entity 必须在 Architecture 中定义'
        target_types: ['domain-types']
        severity: 'error'
      - type: 'adr_linkage'
        description: '架构决策应链接到 ADR'
        target_types: ['adr']
        severity: 'warning'
      - type: 'review_status_sync'
        description: 'Review 状态应与 Plan 状态一致'
        target_types: ['review']
        severity: 'warning'

  # ============================================================================
  # Domain Types: 领域类型定义
  # 路径: docs/architecture/domains/**/types.md
  # 用途: 定义实体、DTO、查询参数的类型
  # ============================================================================
  domain-types:
    type_tag: '<!-- type: domain-types -->'
    path_pattern: '**/types.md'
    required_sections:
      - name: 'entities'
        marker: '<!-- section:entities -->'
        element_marker: '<!-- entity -->'
        element_pattern: '^### (.+?) <!-- entity -->$'
        required: true
    optional_sections:
      - name: 'queries'
        marker: '<!-- section:queries -->'
        element_marker: '<!-- query -->'
        element_pattern: '^### (.+?) <!-- query -->$'
      - name: 'schemas'
        marker: '<!-- section:schemas -->'
        element_marker: '<!-- schema -->'
        element_pattern: '^### (.+?) <!-- schema -->$'
    entity_definition_formats:
      - type: 'typescript_interface'
        pattern: '```typescript\s*\ninterface (\w+)'
        description: 'TypeScript interface 代码块'
      - type: 'typescript_type'
        pattern: '```typescript\s*\ntype (\w+)'
        description: 'TypeScript type 代码块'
      - type: 'markdown_table'
        pattern: '\| 字段 \| 类型 \|'
        description: 'Markdown 表格定义'
    consistency_checks:
      - type: 'cross_file_entity_match'
        description: '同名 entity 跨文件定义必须一致'
        severity: 'error'
      - type: 'field_type_consistency'
        description: '字段类型一致性（考虑别名）'
        severity: 'error'

  # ============================================================================
  # Domain Service: 领域服务接口
  # 路径: docs/architecture/domains/**/service.md
  # 用途: 定义 Service 层接口和方法
  # ============================================================================
  domain-service:
    type_tag: '<!-- type: domain-service -->'
    path_pattern: '**/service.md'
    required_sections:
      - name: 'methods'
        marker: '<!-- section:methods -->'
        element_marker: '<!-- method -->'
        element_pattern: '^### (.+?) <!-- method -->$'
        required: true
    method_definition_formats:
      - type: 'markdown_table'
        pattern: '\| 方法 \| 输入 \| 输出 \|'
        description: '方法表格定义'
      - type: 'typescript_signature'
        pattern: '```typescript\s*\n(?:async )?function (\w+)'
        description: 'TypeScript 函数签名'

  # ============================================================================
  # ADR: 架构决策记录
  # 路径: docs/decisions/ADR-*.md
  # 用途: 记录重大技术决策
  # ============================================================================
  adr:
    type_tag: '<!-- type: adr -->'
    path_pattern: 'docs/decisions/ADR-*.md'
    required_sections:
      - name: '状态'
        pattern: '^## 状态'
        required: true
      - name: '背景'
        pattern: '^## 背景'
        required: true
      - name: '决策'
        pattern: '^## 决策'
        required: true
      - name: '后果'
        pattern: '^## 后果'
        required: true
    status_values:
      - '📝 草案'
      - '🗳️ 讨论中'
      - '✅ 已决策'
      - '✅ 已实施'
      - '❌ 已否决'
      - '📦 已弃用'
    consistency_checks:
      - type: 'deprecated_not_referenced'
        description: '已弃用 ADR 不应被 Plan 引用'
        severity: 'warning'
      - type: 'implemented_in_architecture'
        description: '已实施决策应在 Architecture 中体现'
        severity: 'warning'

  # ============================================================================
  # Review: 文档审查报告
  # 路径: docs/reviews/REVIEW-*.md
  # 用途: 记录文档审查结论和问题
  # ============================================================================
  review:
    type_tag: '<!-- type: review -->'
    path_pattern: 'docs/reviews/REVIEW-*.md'
    required_sections:
      - name: '审查结论'
        pattern: '^## 审查结论'
        required: true
      - name: 'P0 阻塞问题'
        pattern: '^## .*P0'
        required: true
    status_values:
      - '🚧 待修正'
      - '✅ 已修正'
      - '✅ 可实施'
      - '❌ 已废弃'
    consistency_checks:
      - type: 'p0_resolved_before_approved'
        description: '标记可实施前必须解决所有 P0'
        severity: 'error'
      - type: 'plan_link_exists'
        description: '必须关联到 Plan'
        severity: 'warning'

  # ============================================================================
  # README: 目录索引文档
  # 路径: docs/**/README.md, docs/TEMPLATE.md
  # 用途: 目录索引、导航、结构说明
  # ============================================================================
  readme:
    type_tag: '<!-- type: readme -->'
    path_pattern: '**/README.md'
    auto_detect: true  # 路径匹配则自动识别，无需强制标记
    required_sections:
      - name: '简介'
        pattern: '^# |^## (简介|Overview)'
        required: false
    optional_sections:
      - name: '列表'
        pattern: '^## (.*列表|List|目录|Contents)'
      - name: '结构'
        pattern: '^## (.*结构|Structure|模板|Template)'
      - name: '指南'
        pattern: '^## (.*指南|Guide|使用|Usage)'
    index_checks:
      - type: 'link_validity'
        description: '索引中链接的文件必须存在'
        severity: 'warning'
      - type: 'index_completeness'
        description: '子目录中的文档应在索引中列出'
        severity: 'info'
    required_footer:
      pattern: '\*维护者.*\*'
      description: '应包含维护者信息'
      required: false

  # ============================================================================
  # Template: 文档模板
  # 路径: docs/**/TEMPLATE.md
  # 用途: 提供文档创建模板
  # ============================================================================
  template:
    type_tag: '<!-- type: template -->'
    path_pattern: '**/TEMPLATE.md'
    auto_detect: true
    # 模板文档内容本身就是示例，不强制 section 要求
    required_sections: []

  # ============================================================================
  # Domain Repo: 数据访问层文档
  # 路径: docs/architecture/domains/**/repo.md
  # 用途: 定义 Repo 层接口、DTO、查询实现细节
  # ============================================================================
  domain-repo:
    type_tag: '<!-- type: domain-repo -->'
    path_pattern: '**/repo.md'
    required_sections:
      - name: 'Repo 接口'
        pattern: '^## .+Repo'
    structural_sections:
      - name: 'dtos'
        marker: '<!-- section:dtos -->'
        element_marker: '<!-- dto -->'
        required: false
      - name: 'queries'
        marker: '<!-- section:queries -->'
        element_marker: '<!-- query -->'
        required: false
    cross_ref_checks:
      - type: 'dto_type_consistency'
        target: 'domain-types'
        description: 'DTO 字段类型应与 Entity 定义一致'
        severity: 'warning'
      - type: 'time_storage_format'
        target: 'domain-types'
        description: '时间戳存储格式应与 Entity 类型兼容'
        severity: 'error'

  # ============================================================================
  # Domain Schema: 数据库 Schema 文档
  # 路径: docs/architecture/domains/**/schema.md
  # 用途: 定义数据库表结构、索引、约束
  # ============================================================================
  domain-schema:
    type_tag: '<!-- type: domain-schema -->'
    path_pattern: '**/schema.md'
    required_sections:
      - name: '表结构'
        pattern: '^## 表结构|Table Schema'
    cross_ref_checks:
      - type: 'schema_entity_consistency'
        target: 'domain-types'
        description: '表字段应与 Entity 定义一致'
        severity: 'error'

  # ============================================================================
  # Provider: 横切关注点 Provider 配置
  # 路径: docs/architecture/providers/*.md
  # 用途: 定义 Provider 接口、配置、运行时行为
  # ============================================================================
  provider:
    type_tag: '<!-- type: provider -->'
    path_pattern: 'docs/architecture/providers/*.md'
    exclude_pattern: '**/README.md'
    required_sections:
      - name: '接口或配置'
        pattern: '^## (接口|配置|职责)'
        required: false  # 有其一即可，不强制
    optional_sections:
      - name: '接口定义'
        pattern: '^## 接口|Interface'
      - name: '配置'
        pattern: '^## 配置|Config'
    cross_ref_checks:
      - type: 'provider_config_adr_consistency'
        target: 'adr'
        description: 'Provider 配置应与 ADR 决策一致'
        severity: 'warning'

# ============================================================================
# 签名计算配置
# ============================================================================
signature_config:
  # 类型归一化映射（不同写法视为相同类型）
  type_aliases:
    date_time:
      - 'Date'
      - 'DateTime'
      - 'string'  # ISO 日期字符串
      - 'number'  # Unix 时间戳
    identifier:
      - 'string'
      - 'UUID'
      - 'ID'
    currency:
      - 'number'
      - 'Integer'
      - 'Float'
      - 'Decimal'
  
  # 签名包含的字段属性
  signature_fields:
    - 'name'
    - 'normalized_type'
    - 'optional'
    - 'constraints'
  
  # 约束排序键
  constraint_keys:
    - 'min'
    - 'max'
    - 'pattern'
    - 'enum'

# ============================================================================
# 检查规则配置
# ============================================================================
lint_rules:
  # 文档长度
  max_lines: 300
  max_lines_severity: 'info'
  
  # 模糊词汇检查
  vague_terms:
    - '主要'
    - '大部分'
    - '大量'
    - '高并发'
    - '快速'
    - '高效'
    - '可能'
    - '适当'
    - '合理'
  vague_terms_severity: 'warning'
  
  # 链接检查
  check_broken_links: true
  link_check_severity: 'warning'

# ============================================================================
# 回归检测配置
# ============================================================================
regression_detection:
  # 检查已完成的 Plan
  check_completed_plans: true
  
  # 已完成 Plan 与 Architecture 差异处理
  completed_plan_mismatch_severity: 'warning'
  
  # 关键 entity（这些变更必定需要同步 Plan）
  critical_entities:
    - 'Transaction'
    - 'User'
    - 'Account'
    - 'Order'
