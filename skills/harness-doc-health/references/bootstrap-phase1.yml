manifest:
  file: ".harness/bootstrap.toml"
  required_keys:
    - "bootstrap_version"
    - "mode"
    - "preset"
    - "entry_skill"
    - "templates_dir"
  warning_keys:
    - "docs_health_command"
    - "verify_command"
    - "e2e_command"

governance_files:
  - "AGENTS.md"
  - "AGENT_INDEX.md"
  - "PROGRESS.md"
  - "MEMORY.md"
  - "NEXT_STEP.md"

template_files:
  - "docs/superpowers/templates/README.md"
  - "docs/superpowers/templates/SPEC_TEMPLATE.md"
  - "docs/superpowers/templates/PLAN_TEMPLATE.md"
  - "docs/superpowers/templates/CHANGE_REQUEST_TEMPLATE.md"
  - "docs/superpowers/templates/EVIDENCE_TEMPLATE.md"

template_headings:
  "docs/superpowers/templates/SPEC_TEMPLATE.md":
    - "## Problem"
    - "## Success"
    - "## Out Of Scope"
    - "## Critical Paths"
    - "## Frozen Contracts"
    - "## Architecture Invariants"
    - "## Failure Policy"
    - "## Acceptance"
    - "## Deferred Decisions"
  "docs/superpowers/templates/PLAN_TEMPLATE.md":
    - "**Spec Path:**"
    - "**Allowed Write Scope:**"
    - "**Verification Commands:**"
    - "**Evidence Location:**"
    - "## File Map"
    - "## Tasks"
    - "## Completion Checklist"
  "docs/superpowers/templates/CHANGE_REQUEST_TEMPLATE.md":
    - "## Request"
    - "## Classification"
    - "## Reason"
    - "## Impact"
    - "## Decision"
  "docs/superpowers/templates/EVIDENCE_TEMPLATE.md":
    - "## Scenario"
    - "## Commands Run"
    - "## Before Evidence"
    - "## After Evidence"
    - "## Residual Risks"

routing_markers:
  "AGENTS.md":
    - ".harness/bootstrap.toml"
    - "docs/superpowers/templates/"
  "AGENT_INDEX.md":
    - "brainstorming"
    - "writing-plans"
    - "verification-before-completion"
  warning_markers:
    "AGENT_INDEX.md":
      - "harness-doc-health"
